<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#2563eb" stroke="#1e40af" stroke-width="2"/>
  
  <!-- Compass rose -->
  <g fill="white">
    <!-- North arrow -->
    <polygon points="50,15 56,30 50,28 44,30"/>
    
    <!-- East arrow -->
    <polygon points="85,50 70,56 72,50 70,44"/>
    
    <!-- South arrow -->
    <polygon points="50,85 44,70 50,72 56,70"/>
    
    <!-- West arrow -->
    <polygon points="15,50 30,44 28,50 30,56"/>
  </g>
  
  <!-- Center circle -->
  <circle cx="50" cy="50" r="6" fill="white"/>
</svg>
