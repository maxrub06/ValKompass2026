            const container = document.getElementById('questionsContainer');

                    <h3 class="text-lg font-semibold text-gray-800 mb-4">
                        <span class="text-blue-600 font-bold">${index + 1}.</span> ${item.question}
                    </h3>
                    <p class="text-sm text-gray-500 mb-4">Kategori: ${item.category}</p>
                    <div class="flex flex-wrap gap-3">

                            <span class="ml-2 text-gray-700 group-hover:text-red-600">Helt oenig</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <input type="radio" name="q${item.id}" value="2" class="w-4 h-4 text-orange-500">
                            <span class="ml-2 text-gray-700 group-hover:text-orange-500">Delvis oenig</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <input type="radio" name="q${item.id}" value="3" class="w-4 h-4 text-gray-400">
                            <span class="ml-2 text-gray-700 group-hover:text-gray-600">Neutral</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <input type="radio" name="q${item.id}" value="4" class="w-4 h-4 text-lime-500">
                            <span class="ml-2 text-gray-700 group-hover:text-lime-500">Delvis enig</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <input type="radio" name="q${item.id}" value="5" class="w-4 h-4 text-green-600">
                            <span class="ml-2 text-gray-700 group-hover:text-green-600">Helt enig</span>
                        </label>
                    </div>
                `;
                container.appendChild(questionDiv);
            });

            document.getElementById('totalCount').textContent = quizData.length;

            // Add event listeners for progress tracking
            form.addEventListener('change', updateProgress);
            form.addEventListener('reset', () => {
                setTimeout(updateProgress, 0);
            });
            form.addEventListener('submit', handleSubmit);
        }

        function updateProgress() {
            const form = document.getElementById('compassForm');
            const answeredCount = document.querySelectorAll('#compassForm input[type="radio"]:checked').length;
            const total = quizData.length;

            document.getElementById('answeredCount').textContent = answeredCount;
            const percentage = (answeredCount / total) * 100;
            document.getElementById('progressBar').style.width = percentage + '%';
        }

        function handleSubmit(e) {
            e.preventDefault();

            const form = document.getElementById('compassForm');
            const answers = {};
            
            // Collect answers
            quizData.forEach(item => {
                const selectedValue = document.querySelector(`input[name="q${item.id}"]:checked`);
                if (selectedValue) {
                    answers[`q${item.id}`] = parseInt(selectedValue.value);
                }
            });

            // Check if all questions are answered
            if (Object.keys(answers).length < quizData.length) {
                alert('Vänligen besvara alla frågor innan du skickar in dina svar.');
                return;
            }

            // Calculate party scores
            const partyScores = {
                "Moderaterna": 0,
                "Sverigedemokraterna": 0,
                "Socialdemokraterna": 0,
                "Vänsterpartiet": 0,
                "Miljöpartiet": 0,
                "Centerpartiet": 0,
                "Liberalerna": 0,
                "Kristdemokraterna": 0,
                "Medborgerlig Samling": 0,
                "Alternativ för Sverige": 0
            };

            quizData.forEach(item => {
                const userAnswer = answers[`q${item.id}`];
                Object.keys(item.responses).forEach(party => {
                    const partyAnswer = item.responses[party];
                    const difference = Math.abs(userAnswer - partyAnswer);
                    
                    // Points based on difference
                    let points = 0;
                    if (difference === 0) {
                        points = 1; // Helt enig
                    } else if (difference === 1) {
                        points = 1; // Delvis enig
                    } else if (difference === 2) {
                        points = 0; // Neutral
                    } else if (difference === 3) {
                        points = -1; // Delvis oenig
                    } else if (difference === 4) {
                        points = -2; // Helt oenig
                    }
                    
                    partyScores[party] += points;
                });
            });

            // Store results and redirect
            localStorage.setItem('compassResults', JSON.stringify(partyScores));
            window.location.href = 'valkompass-results.html';
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initializeQuiz);
