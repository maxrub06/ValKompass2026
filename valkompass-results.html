<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valkompass 2026 - Resultat</title>
    <link rel="icon" href="valkompasslogga.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="valkompasslogga.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="valkompasslogga.svg">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <img src="valkompasslogga.svg" alt="Valkompass Logo" class="w-8 h-8">
                <span class="font-bold text-xl text-blue-600">Valkompass 2026</span>
            </div>
            <a href="index.html" class="text-gray-600 hover:text-blue-600 font-medium">Hem</a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-6xl mx-auto px-4 py-12">
        <div class="bg-white rounded-lg shadow-lg p-8 mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-2">Dina Resultat</h1>
            <p class="text-gray-600">Här ser du hur väl du överensstämmer med varje parti.</p>
        </div>

        <!-- Results Grid -->
        <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <!-- Results will be loaded here -->
        </div>

        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 mb-12">
            <a href="valkompass1.html" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg text-center transition-colors">
                Gör om Quiz
            </a>
            <a href="index.html" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-lg text-center transition-colors">
                Tillbaka till Hem
            </a>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white mt-12 py-6">
        <div class="max-w-6xl mx-auto px-4 text-center">
            <p class="text-gray-400">Valkompass 2026 - Jämför dina politiska åsikter</p>
        </div>
    </footer>

    <script>
        function displayResults() {
            const resultsData = localStorage.getItem('compassResults');
            
            if (!resultsData) {
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="col-span-full bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center">
                        <p class="text-yellow-800 font-semibold mb-4">Du har inte genomfört quizet ännu.</p>
                        <a href="valkompass1.html" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded inline-block">
                            Starta Quiz
                        </a>
                    </div>
                `;
                return;
            }

            const scores = JSON.parse(resultsData);
            const numQuestions = 12; // Total number of questions
            const maxPossibleScore = numQuestions; // Max 1 point per question

            // Sort parties by score (highest first)
            const sortedParties = Object.entries(scores).sort((a, b) => b[1] - a[1]);

            const container = document.getElementById('resultsContainer');
            container.innerHTML = '';

            sortedParties.forEach(([party, score], index) => {
                // Calculate percentage: if negative, show 0%; otherwise (score / maxPossibleScore) * 100, capped at 100%
                let percentage = 0;
                if (score > 0) {
                    percentage = Math.min(100, Math.round((score / maxPossibleScore) * 100));
                }

                const partyLogos = {
                    "Moderaterna": "logos/moderaterna.png",
                    "Sverigedemokraterna": "logos/sverigedemokraterna.png",
                    "Socialdemokraterna": "logos/socialdemokraterna.png",
                    "Vänsterpartiet": "logos/vansterpartiet.png",
                    "Miljöpartiet": "logos/miljopartiet.png",
                    "Centerpartiet": "logos/centerpartiet.png",
                    "Liberalerna": "logos/liberalerna.png",
                    "Kristdemokraterna": "logos/kristdemokraterna.png",
                    "Medborgerlig Samling": "logos/medborgerligsamling.png",
                    "Alternativ för Sverige": "logos/alternativforsverige.png"
                };

                const partyLinks = {
                    "Moderaterna": "moderaterna.html",
                    "Sverigedemokraterna": "sverigedemokraterna.html",
                    "Socialdemokraterna": "socialdemokraterna.html",
                    "Vänsterpartiet": "vänsterpartiet.html",
                    "Miljöpartiet": "miljöpartiet.html",
                    "Centerpartiet": "centerpartiet.html",
                    "Liberalerna": "liberalerna.html",
                    "Kristdemokraterna": "kristdemokraterna.html",
                    "Medborgerlig Samling": "medborgerligsamling.html",
                    "Alternativ för Sverige": "alternativforsverige.html"
                };

                const borderColor = index === 0 ? 'border-yellow-400' : index === 1 ? 'border-gray-300' : index === 2 ? 'border-orange-300' : 'border-gray-200';
                
                const resultCard = document.createElement('div');
                resultCard.className = `bg-white rounded-lg shadow-md p-6 border-l-4 ${borderColor} hover:shadow-lg transition-shadow`;
                resultCard.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-4 flex-1">
                            <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center flex-shrink-0">
                                <img src="${partyLogos[party]}" alt="${party}" class="w-14 h-14 object-cover rounded-full">
                            </div>
                            <div>
                                <a href="${partyLinks[party]}" class="text-lg font-bold text-gray-900 hover:text-blue-600 transition-colors">
                                    ${party}
                                </a>
                                <p class="text-sm text-gray-500">Överensstämmelse</p>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="flex justify-between mb-2">
                            <span class="text-2xl font-bold text-blue-600">${percentage}%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div class="bg-blue-600 h-3 rounded-full transition-all" style="width: ${percentage}%"></div>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500">Poäng: ${score} / ${maxPossibleScore}</p>
                `;
                container.appendChild(resultCard);
            });
        }

        window.addEventListener('DOMContentLoaded', displayResults);
    </script>
</body>
</html>
